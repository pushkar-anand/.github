name: Go CI

on:
  workflow_call:
    inputs:
      build-tags:
        description: "Space-separated Go build tags (e.g. goolm)"
        type: string
        default: ""
      go-version-file:
        description: "Path to go.mod for Go version"
        type: string
        default: "go.mod"
      run-lint:
        description: "Run staticcheck lint job"
        type: boolean
        default: false
      generate-command:
        description: "Command to regenerate code (e.g. 'make generate'). Empty = skip."
        type: string
        default: ""

jobs:
  ci:
    name: Build, Vet & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Check go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run generate
        if: ${{ inputs.generate-command != '' }}
        run: ${{ inputs.generate-command }}

      - name: Ensure generated files are up to date
        if: ${{ inputs.generate-command != '' }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Run '${{ inputs.generate-command }}' and commit the result."
            git status
            git diff
            exit 1
          fi

      - name: Build
        run: |
          TAGS="${{ inputs.build-tags }}"
          go build ${TAGS:+-tags "$TAGS"} ./...

      - name: Vet
        run: |
          TAGS="${{ inputs.build-tags }}"
          go vet ${TAGS:+-tags "$TAGS"} ./...

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: |
          TAGS="${{ inputs.build-tags }}"
          go test ${TAGS:+-tags "$TAGS"} -race -count=1 ./...

  lint:
    name: Lint (staticcheck)
    runs-on: ubuntu-latest
    if: ${{ inputs.run-lint }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: staticcheck
        uses: reviewdog/action-staticcheck@e91d47e9aa9ad972ed705a6f531f3c0fb33f8a8e # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: nofilter
          fail_on_error: true
          staticcheck_flags: ${{ inputs.build-tags && format('-tags {0}', inputs.build-tags) || '' }}
